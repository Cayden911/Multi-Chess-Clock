<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chess clock</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f0f12;
      color: #f4f4f5;
    }

    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 99999;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
      border-bottom: 2px solid rgba(0, 0, 0, 0.4);
    }
  #top-bar.debug { background: #ffcc00; color: #000; }
    #top-bar.connected { background: #166534; color: #ecfdf5; }
    #top-bar.reconnecting { background: #a16207; color: #fff; }
    #top-bar.offline { background: #7f1d1d; color: #fff; }

    body { padding-top: 34px; }

    #clock {
      position: relative;
      display: none;
      width: 100%;
      height: 100%;
      min-height: 300px;
    }
    #clock.under-overlay { display: block; opacity: 0.45; }
    #clock.active { display: block; opacity: 1; cursor: pointer; }

    .clock-inner {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      width: 100%;
      height: 100%;
      min-height: 300px;
    }

    .main-player {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 16px;
      min-height: 180px;
    }
    .main-player .name { font-size: 2rem; font-weight: bold; margin-bottom: 8px; }
    .main-player .time { font-size: 4.5rem; font-weight: bold; }

    .strip {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      width: 100%;
      min-height: 90px;
      border-top: 3px solid rgba(0, 0, 0, 0.35);
    }
    .strip-cell {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 10px;
      border-right: 2px solid rgba(0, 0, 0, 0.25);
    }
    .strip-cell:last-child { border-right: none; }
    .strip-cell .name { font-size: 1rem; font-weight: bold; }
    .strip-cell .time { font-size: 1.5rem; font-weight: bold; }

    .flag-count {
      margin-top: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      color: #ef4444;
    }

    #paused-layer {
      display: none;
      position: fixed;
      top: 34px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 14;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      background: rgba(24, 24, 27, 0.94);
    }
    #clock.paused #paused-layer {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
    }
    .paused-label {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #pause-toggle, #reset-btn {
      display: none;
      position: fixed;
      top: 44px;
      z-index: 25;
      height: 44px;
      padding: 0 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.55);
      color: #fafafa;
      font-size: 16px;
      font-weight: bold;
      line-height: 44px;
      text-align: center;
    }
    #pause-toggle { right: 10px; width: 48px; padding: 0; }
    #reset-btn { right: 66px; }
    #clock.active #pause-toggle,
    #clock.active #reset-btn { display: block; }

    #overlay {
      position: fixed;
      top: 34px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      background: #121216;
      overflow: auto;
    }
    #overlay.hidden { display: none; }

    .overlay-title {
      text-align: center;
      padding: 14px 14px 8px;
      font-size: 1.25rem;
      font-weight: bold;
      text-transform: uppercase;
      color: #a1a1aa;
    }
    .overlay-fields {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      padding: 10px 14px;
      overflow: auto;
    }
    .field-block { margin-bottom: 12px; }
    .field-block label {
      display: block;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      color: #71717a;
      margin-bottom: 6px;
    }
    .field-block input,
    .field-block textarea {
      width: 100%;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
      line-height: 1.4;
      padding: 8px 10px;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      background: #18181b;
      color: #e4e4e7;
    }
    .field-block textarea { min-height: 100px; }
    .field-block input { font-family: Arial, Helvetica, sans-serif; }
    #start-error {
      color: #f87171;
      font-size: 0.85rem;
      padding: 0 14px;
      min-height: 18px;
    }
    .go-wrap {
      padding: 12px 14px 18px;
      text-align: center;
    }
    #go, #sync-config-btn {
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      margin: 0 6px 8px;
    }
    #go { background: #22c55e; color: #052e16; }
    #sync-config-btn { background: #3b82f6; color: #fff; }
    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: #71717a;
      padding: 0 14px 8px;
    }
    noscript {
      display: block;
      padding: 20px;
      background: #7f1d1d;
      color: #fff;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <noscript>JavaScript is required for this chess clock.</noscript>
  <div id="top-bar" class="debug">MULTI CHESS CLOCK — loading…</div>

  <div id="clock" class="under-overlay" aria-hidden="true">
    <button type="button" id="reset-btn" title="Reset game">Reset</button>
    <button type="button" id="pause-toggle" aria-label="Pause" title="Pause">||</button>
    <div id="paused-layer" aria-hidden="true">
      <span class="paused-label">Paused</span>
    </div>
    <div class="clock-inner">
      <div id="main-slot" class="main-player"></div>
      <div id="strip" class="strip"></div>
    </div>
  </div>

  <div id="overlay">
    <div class="overlay-title">Chess clock — shared room</div>
    <div class="overlay-fields">
      <div class="field-block">
        <label for="server-input">Backend server URL</label>
        <input type="text" id="server-input" spellcheck="false" autocomplete="off" value="http://localhost:3000" />
      </div>
      <div class="field-block">
        <label for="room-display">Room ID (from URL)</label>
        <input type="text" id="room-display" readonly="readonly" />
      </div>
      <div class="field-block">
        <label for="config-input">Config</label>
        <textarea id="config-input" spellcheck="false" autocomplete="off">{
  "players": [
    { "name": "North", "backgroundColor": "#1e3a5f", "increment": 5, "startTime": 10 },
    { "name": "East", "backgroundColor": "#5f1e3a", "increment": 5, "startTime": 10 },
    { "name": "South", "backgroundColor": "#3a5f1e", "increment": 5, "startTime": 10 },
    { "name": "West", "backgroundColor": "#5f3a1e", "increment": 5, "startTime": 10 }
  ]
}</textarea>
      </div>
      <div class="field-block">
        <label for="save-input">Resume state (optional JSON)</label>
        <textarea id="save-input" spellcheck="false" autocomplete="off" placeholder="Leave empty for a new game"></textarea>
      </div>
    </div>
    <div id="start-error" role="alert"></div>
    <div class="hint">Shared room: same URL + room = same clock for everyone · Click or Space — end turn · Esc — undo</div>
    <div class="go-wrap">
      <button type="button" id="sync-config-btn">Apply config to room</button>
      <button type="button" id="go">Start game</button>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  var topBar = document.getElementById('top-bar');
  var overlay = document.getElementById('overlay');
  var clockEl = document.getElementById('clock');
  var mainSlot = document.getElementById('main-slot');
  var stripEl = document.getElementById('strip');
  var serverInput = document.getElementById('server-input');
  var roomDisplay = document.getElementById('room-display');
  var configInput = document.getElementById('config-input');
  var saveInput = document.getElementById('save-input');
  var goBtn = document.getElementById('go');
  var syncConfigBtn = document.getElementById('sync-config-btn');
  var startError = document.getElementById('start-error');
  var pauseBtn = document.getElementById('pause-toggle');
  var resetBtn = document.getElementById('reset-btn');

  var roomId = 'default';
  var serverUrl = '';
  var socket = null;
  var connected = false;
  var serverState = null;
  var serverOffsetMs = 0;
  var rafId = 0;
  var sirenOn = false;
  var lastSirenIndex = -1;

  var audioCtx = null;
  var sirenOsc = null;
  var sirenGain = null;
  var sirenLfo = null;

  function isFiniteNumber(n) {
    return typeof n === 'number' && isFinite(n);
  }

  function isIntegerNumber(n) {
    return isFiniteNumber(n) && Math.floor(n) === n;
  }

  function pad2(n) {
    return n < 10 ? '0' + n : String(n);
  }

  function isArray(val) {
    return Object.prototype.toString.call(val) === '[object Array]';
  }

  function trim(str) {
    return String(str || '').replace(/^\s+|\s+$/g, '');
  }

  function getQueryParam(name) {
    var search = window.location.search || '';
    var regex = new RegExp('[?&]' + name + '=([^&]*)');
    var m = search.match(regex);
    return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : null;
  }

  function getRoomIdFromUrl() {
    var q = getQueryParam('room');
    if (q) return q;
    var pathMatch = window.location.pathname.match(/\/game\/([^/]+)/);
    if (pathMatch) return decodeURIComponent(pathMatch[1]);
    var hash = window.location.hash || '';
    var hashMatch = hash.match(/room=([^&]+)/);
    if (hashMatch) return decodeURIComponent(hashMatch[1]);
    return 'default';
  }

  function getServerUrlFromUrl() {
    var q = getQueryParam('server');
    if (q) return trim(q).replace(/\/$/, '');
    if (window.location.protocol.indexOf('http') === 0 && window.location.port) {
      return window.location.protocol + '//' + window.location.host;
    }
    if (window.location.protocol.indexOf('http') === 0 && !window.location.port &&
        window.location.hostname === 'localhost') {
      return window.location.protocol + '//' + window.location.host;
    }
    return 'http://localhost:3000';
  }

  function setStatus(mode, text) {
    topBar.className = mode;
    topBar.innerHTML = '';
    topBar.appendChild(document.createTextNode(text));
  }

  function showError(msg) {
    startError.innerHTML = '';
    startError.appendChild(document.createTextNode(msg || ''));
  }

  function isTypingTarget(el) {
    if (!el || !el.tagName) return false;
    var t = el.tagName.toLowerCase();
    return t === 'textarea' || t === 'input' || el.isContentEditable;
  }

  function normalizePlayers(obj) {
    var list = [];
    var i;
    var p;
    if (!obj || !isArray(obj.players)) return null;
    for (i = 0; i < obj.players.length; i++) {
      p = obj.players[i];
      list.push({
        name: String(p.name),
        backgroundColor: String(p.backgroundColor),
        increment: Number(p.increment),
        startTime: Number(p.startTime)
      });
    }
    return list;
  }

  function parseConfig(text) {
    var trimmed = trim(text);
    var data;
    var players;
    var i;
    var p;
    if (!trimmed) return { error: 'Config is empty.' };
    try {
      data = JSON.parse(trimmed);
    } catch (e) {
      return { error: 'Config is not valid JSON.' };
    }
    players = normalizePlayers(data);
    if (!players || players.length === 0) {
      return { error: 'Config must include a non-empty "players" array.' };
    }
    for (i = 0; i < players.length; i++) {
      p = players[i];
      if (!isFiniteNumber(p.increment) || p.increment < 0) {
        return { error: 'Player ' + (i + 1) + ': increment must be a non-negative number.' };
      }
      if (!isFiniteNumber(p.startTime) || p.startTime < 0) {
        return { error: 'Player ' + (i + 1) + ': startTime must be a non-negative number.' };
      }
    }
    return { players: players };
  }

  function parseSave(text) {
    var trimmed = trim(text);
    var data;
    var rem = [];
    var oc = [];
    var i;
    if (!trimmed) return { empty: true };
    try {
      data = JSON.parse(trimmed);
      if (!data || typeof data !== 'object') {
        return { error: 'Save state must be a JSON object.' };
      }
      if (!isArray(data.remainingMs)) {
        return { error: 'Save state must include "remainingMs" array.' };
      }
      for (i = 0; i < data.remainingMs.length; i++) {
        rem.push(Number(data.remainingMs[i]));
      }
      for (i = 0; i < rem.length; i++) {
        if (!isFiniteNumber(rem[i]) || rem[i] < 0) {
          return { error: 'remainingMs must be non-negative numbers.' };
        }
      }
      if (!isIntegerNumber(Number(data.currentIndex))) {
        return { error: 'Save state must include currentIndex.' };
      }
      if (isArray(data.outOfTimeCounts)) {
        for (i = 0; i < data.outOfTimeCounts.length; i++) {
          oc.push(Number(data.outOfTimeCounts[i]));
        }
      }
      return {
        empty: false,
        remainingMs: rem,
        currentIndex: Number(data.currentIndex),
        outOfTimeCounts: oc.length ? oc : null
      };
    } catch (e2) {
      return { error: 'Resume state is not valid JSON.' };
    }
  }

  function serverNow() {
    return new Date().getTime() - serverOffsetMs;
  }

  function displayRemainingMs(state, idx) {
    var rem = state.remainingMs[idx];
    if (!state.playing || state.paused || idx !== state.currentIndex) return rem;
    var elapsed = Math.max(0, serverNow() - state.lastTickAt);
    return Math.max(0, rem - elapsed);
  }

  function formatTime(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    var h = Math.floor(s / 3600);
    var m = Math.floor((s % 3600) / 60);
    var sec = s % 60;
    if (h > 0) return h + ':' + pad2(m) + ':' + pad2(sec);
    return String(m) + ':' + pad2(sec);
  }

  function stopSiren() {
    try {
      if (sirenLfo && sirenLfo.stop) sirenLfo.stop();
      if (sirenOsc && sirenOsc.stop) sirenOsc.stop();
    } catch (ignore) {}
    sirenLfo = null;
    sirenOsc = null;
    sirenGain = null;
    sirenOn = false;
  }

  function startSiren() {
    var ctx;
    var lfoGain;
    if (sirenOsc) return;
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      ctx = audioCtx;
      if (ctx.state === 'suspended' && ctx.resume) ctx.resume();
      sirenGain = ctx.createGain();
      sirenGain.gain.value = 0.12;
      sirenOsc = ctx.createOscillator();
      sirenOsc.type = 'sawtooth';
      sirenOsc.frequency.value = 440;
      sirenLfo = ctx.createOscillator();
      sirenLfo.type = 'sine';
      sirenLfo.frequency.value = 4;
      lfoGain = ctx.createGain();
      lfoGain.gain.value = 280;
      sirenLfo.connect(lfoGain);
      lfoGain.connect(sirenOsc.frequency);
      sirenOsc.connect(sirenGain);
      sirenGain.connect(ctx.destination);
      sirenLfo.start();
      sirenOsc.start();
      sirenOn = true;
    } catch (ignore2) {}
  }

  function appendFlagCount(container, idx, state) {
    var c = state.outOfTimeCounts[idx] || 0;
    var el;
    if (c < 1) return;
    el = document.createElement('div');
    el.className = 'flag-count';
    el.appendChild(document.createTextNode('Out of time: ' + c));
    container.appendChild(el);
  }

  function renderClock() {
    var state = serverState;
    var players;
    var n;
    var cur;
    var k;
    var idx;
    var p;
    var cell;
    var activeRem;
    if (!state || !state.players || !state.players.length) return;

    players = state.players;
    n = players.length;
    cur = players[state.currentIndex];
    activeRem = displayRemainingMs(state, state.currentIndex);

    if (state.playing && !state.paused && activeRem <= 0) {
      if (!sirenOn || lastSirenIndex !== state.currentIndex) {
        stopSiren();
        startSiren();
        lastSirenIndex = state.currentIndex;
      }
    } else {
      stopSiren();
      lastSirenIndex = -1;
    }

    mainSlot.style.background = cur.backgroundColor;
    mainSlot.innerHTML = '<div class="name"></div><div class="time"></div>';
    mainSlot.querySelector('.name').appendChild(document.createTextNode(cur.name));
    mainSlot.querySelector('.time').appendChild(document.createTextNode(formatTime(activeRem)));
    appendFlagCount(mainSlot, state.currentIndex, state);

    stripEl.innerHTML = '';
    if (n <= 1) {
      stripEl.style.display = 'none';
    } else {
      stripEl.style.display = 'flex';
      for (k = 1; k < n; k++) {
        idx = (state.currentIndex + k) % n;
        p = players[idx];
        cell = document.createElement('div');
        cell.className = 'strip-cell';
        cell.style.background = p.backgroundColor;
        cell.innerHTML = '<div class="name"></div><div class="time"></div>';
        cell.querySelector('.name').appendChild(document.createTextNode(p.name));
        cell.querySelector('.time').appendChild(
          document.createTextNode(formatTime(displayRemainingMs(state, idx)))
        );
        appendFlagCount(cell, idx, state);
        stripEl.appendChild(cell);
      }
    }

    if (state.playing) {
      clockEl.className = state.paused ? 'active paused' : 'active';
      pauseBtn.innerHTML = state.paused ? '&#9654;' : '||';
      pauseBtn.setAttribute('aria-label', state.paused ? 'Resume' : 'Pause');
      pauseBtn.setAttribute('title', state.paused ? 'Resume' : 'Pause');
      overlay.className = 'hidden';
      clockEl.setAttribute('aria-hidden', 'false');
    } else {
      clockEl.className = 'under-overlay';
      overlay.className = '';
      clockEl.setAttribute('aria-hidden', 'true');
      stopSiren();
    }
  }

  function applyServerPayload(payload) {
    if (!payload || !payload.state) return;
    serverState = payload.state;
    if (isFiniteNumber(payload.serverNow)) {
      serverOffsetMs = new Date().getTime() - payload.serverNow;
    }
    renderClock();
  }

  function scheduleRenderLoop() {
    renderClock();
    rafId = window.requestAnimationFrame
      ? requestAnimationFrame(scheduleRenderLoop)
      : setTimeout(scheduleRenderLoop, 33);
  }

  function sendAction(action, payload, onDone) {
    if (!socket || !connected) {
      showError('Not connected to server. Check backend URL and try again.');
      if (onDone) onDone({ ok: false, error: 'offline' });
      return;
    }
    socket.emit('action', {
      roomId: roomId,
      action: action,
      payload: payload || {}
    }, function (res) {
      if (res && res.ok) {
        applyServerPayload(res);
        showError('');
      } else if (res && res.error) {
        showError(res.error);
      }
      if (onDone) onDone(res);
    });
  }

  function loadScript(url, cb) {
    var script = document.createElement('script');
    script.src = url;
    script.onload = function () { cb(null); };
    script.onerror = function () { cb(new Error('Failed to load ' + url)); };
    document.head.appendChild(script);
  }

  function fetchInitialState(cb) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', serverUrl + '/api/rooms/' + encodeURIComponent(roomId) + '/state', true);
    xhr.onreadystatechange = function () {
      if (xhr.readyState !== 4) return;
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          cb(null, JSON.parse(xhr.responseText));
        } catch (e) {
          cb(e);
        }
      } else {
        cb(new Error('HTTP ' + xhr.status));
      }
    };
    xhr.onerror = function () { cb(new Error('Network error')); };
    xhr.send();
  }

  function connectSocket() {
    if (!window.io) {
      setStatus('offline', 'Offline / local only — Socket.IO client failed to load');
      return;
    }
    if (socket) {
      socket.disconnect();
      socket = null;
    }

    setStatus('reconnecting', 'Reconnecting to shared server… room: ' + roomId);

    socket = window.io(serverUrl, {
      transports: ['polling', 'websocket'],
      reconnection: true,
      reconnectionAttempts: Infinity,
      timeout: 20000
    });

    socket.on('connect', function () {
      connected = true;
      setStatus('connected', 'Connected to shared server — room: ' + roomId);
      socket.emit('join', { roomId: roomId }, function (res) {
        if (res && res.ok) applyServerPayload(res);
        else if (res && res.error) showError(res.error);
      });
    });

    socket.on('disconnect', function () {
      connected = false;
      setStatus('reconnecting', 'Reconnecting… room: ' + roomId);
    });

    socket.on('connect_error', function () {
      connected = false;
      setStatus('offline', 'Offline / local only — cannot reach ' + serverUrl);
    });

    socket.on('state', function (payload) {
      applyServerPayload(payload);
    });
  }

  function initConnection() {
    serverUrl = trim(serverInput.value).replace(/\/$/, '');
    if (!serverUrl) {
      setStatus('offline', 'Offline / local only — enter a backend server URL');
      return;
    }

    setStatus('debug', 'MULTI CHESS CLOCK — loading shared server…');

    fetchInitialState(function (err, data) {
      if (!err && data) applyServerPayload(data);
      loadScript(serverUrl + '/socket.io/socket.io.js', function (loadErr) {
        if (loadErr) {
          setStatus('offline', 'Offline / local only — could not load Socket.IO from server');
          return;
        }
        connectSocket();
      });
    });
  }

  function trySyncConfig() {
    var cfgResult = parseConfig(configInput.value);
    showError('');
    if (cfgResult.error) {
      showError(cfgResult.error);
      return;
    }
    sendAction('setConfig', { players: cfgResult.players });
  }

  function tryStart() {
    var cfgResult = parseConfig(configInput.value);
    var saveResult;
    var payload;
    showError('');
    if (cfgResult.error) {
      showError(cfgResult.error);
      return;
    }
    saveResult = parseSave(saveInput.value);
    if (saveResult.error) {
      showError(saveResult.error);
      return;
    }
    payload = { players: cfgResult.players };
    if (!saveResult.empty) {
      if (saveResult.remainingMs.length !== cfgResult.players.length) {
        showError('Resume remainingMs length must match player count in config.');
        return;
      }
      payload.resume = {
        remainingMs: saveResult.remainingMs,
        currentIndex: saveResult.currentIndex,
        outOfTimeCounts: saveResult.outOfTimeCounts
      };
    }
    sendAction('start', payload);
  }

  function onKeyDown(e) {
    var code = e.code || e.key || '';
    var keyCode = e.keyCode || e.which;
    if (!serverState || !serverState.playing || isTypingTarget(document.activeElement)) return;
    if (code === 'Space' || keyCode === 32) {
      if (e.preventDefault) e.preventDefault();
      if (!serverState.paused) sendAction('endTurn');
    } else if (code === 'Escape' || keyCode === 27) {
      if (e.preventDefault) e.preventDefault();
      if (!serverState.paused) sendAction('undo');
    }
  }

  roomId = getRoomIdFromUrl();
  roomDisplay.value = roomId;
  serverInput.value = getServerUrlFromUrl();

  goBtn.addEventListener('click', tryStart);
  syncConfigBtn.addEventListener('click', trySyncConfig);
  pauseBtn.addEventListener('click', function (e) {
    if (e.stopPropagation) e.stopPropagation();
    if (!serverState || !serverState.playing) return;
    sendAction('togglePause');
  });
  resetBtn.addEventListener('click', function (e) {
    if (e.stopPropagation) e.stopPropagation();
    sendAction('reset');
  });
  clockEl.addEventListener('click', function () {
    if (!serverState || !serverState.playing || serverState.paused) return;
    sendAction('endTurn');
  });
  document.addEventListener('keydown', onKeyDown);
  serverInput.addEventListener('change', initConnection);

  scheduleRenderLoop();
  initConnection();
})();
  </script>
</body>
</html>
