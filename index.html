<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chess clock</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f0f12;
      color: #f4f4f5;
    }

    #clock {
      position: relative;
      display: none;
      width: 100%;
      height: 100%;
      min-height: 300px;
    }
    #clock.under-overlay {
      display: block;
      opacity: 0.45;
    }
    #clock.active {
      display: block;
      opacity: 1;
      cursor: pointer;
    }

    .clock-inner {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      width: 100%;
      height: 100%;
      min-height: 300px;
    }

    .main-player {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 16px;
      min-height: 180px;
    }
    .main-player .name {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .main-player .time {
      font-size: 4.5rem;
      font-weight: bold;
    }

    .strip {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      width: 100%;
      min-height: 90px;
      border-top: 3px solid rgba(0, 0, 0, 0.35);
    }
    .strip-cell {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 10px;
      border-right: 2px solid rgba(0, 0, 0, 0.25);
    }
    .strip-cell:last-child { border-right: none; }
    .strip-cell .name { font-size: 1rem; font-weight: bold; }
    .strip-cell .time { font-size: 1.5rem; font-weight: bold; }

    .flag-count {
      margin-top: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      color: #ef4444;
    }

    #paused-layer {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 14;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      background: rgba(24, 24, 27, 0.94);
    }
    #clock.paused #paused-layer {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
    }
    .paused-label {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #pause-toggle {
      display: none;
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 25;
      width: 48px;
      height: 48px;
      padding: 0;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.55);
      color: #fafafa;
      font-size: 18px;
      font-weight: bold;
      line-height: 48px;
      text-align: center;
    }
    #clock.active #pause-toggle { display: block; }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      background: #121216;
      overflow: auto;
    }
    #overlay.hidden { display: none; }

    .overlay-title {
      text-align: center;
      padding: 14px 14px 8px;
      font-size: 1.25rem;
      font-weight: bold;
      text-transform: uppercase;
      color: #a1a1aa;
    }
    .overlay-fields {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      padding: 10px 14px;
      overflow: auto;
    }
    .field-block { margin-bottom: 12px; }
    .field-block label {
      display: block;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      color: #71717a;
      margin-bottom: 6px;
    }
    .field-block textarea {
      width: 100%;
      min-height: 100px;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
      line-height: 1.4;
      padding: 8px 10px;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      background: #18181b;
      color: #e4e4e7;
    }
    #start-error {
      color: #f87171;
      font-size: 0.85rem;
      padding: 0 14px;
      min-height: 18px;
    }
    .go-wrap {
      padding: 12px 14px 18px;
      text-align: center;
    }
    #go {
      border: none;
      border-radius: 10px;
      padding: 12px 48px;
      font-size: 1.1rem;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      background: #22c55e;
      color: #052e16;
    }
    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: #71717a;
      padding: 0 14px 8px;
    }
    noscript {
      display: block;
      padding: 20px;
      background: #7f1d1d;
      color: #fff;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <noscript>JavaScript is required for this chess clock.</noscript>

  <div id="clock" class="under-overlay" aria-hidden="true">
    <button type="button" id="pause-toggle" aria-label="Pause" title="Pause">||</button>
    <div id="paused-layer" aria-hidden="true">
      <span class="paused-label">Paused</span>
    </div>
    <div class="clock-inner">
      <div id="main-slot" class="main-player"></div>
      <div id="strip" class="strip"></div>
    </div>
  </div>

  <div id="overlay">
    <div class="overlay-title">Chess clock</div>
    <div class="overlay-fields">
      <div class="field-block">
        <label for="config-input">Config</label>
        <textarea id="config-input" spellcheck="false" autocomplete="off">{
  "players": [
    { "name": "North", "backgroundColor": "#1e3a5f", "increment": 5, "startTime": 10 },
    { "name": "East", "backgroundColor": "#5f1e3a", "increment": 5, "startTime": 10 },
    { "name": "South", "backgroundColor": "#3a5f1e", "increment": 5, "startTime": 10 },
    { "name": "West", "backgroundColor": "#5f3a1e", "increment": 5, "startTime": 10 }
  ]
}</textarea>
      </div>
      <div class="field-block">
        <label for="save-input">Previous save state</label>
        <textarea id="save-input" spellcheck="false" autocomplete="off" placeholder="Leave empty for a new game"></textarea>
      </div>
    </div>
    <div id="start-error" role="alert"></div>
    <div class="hint">Click or Space — end turn · Esc — undo · Pause — top right</div>
    <div class="go-wrap">
      <button type="button" id="go">Go</button>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  var overlay = document.getElementById('overlay');
  var clockEl = document.getElementById('clock');
  var mainSlot = document.getElementById('main-slot');
  var stripEl = document.getElementById('strip');
  var configInput = document.getElementById('config-input');
  var saveInput = document.getElementById('save-input');
  var goBtn = document.getElementById('go');
  var startError = document.getElementById('start-error');
  var pauseBtn = document.getElementById('pause-toggle');

  var playing = false;
  var paused = false;
  var gameConfig = null;
  var initialConfig = null;
  var remainingMs = [];
  var outOfTimeCounts = [];
  var currentIndex = 0;
  var lastTs = 0;
  var rafId = 0;
  var undoStack = [];

  var audioCtx = null;
  var sirenOsc = null;
  var sirenGain = null;
  var sirenLfo = null;

  function isFiniteNumber(n) {
    return typeof n === 'number' && isFinite(n);
  }

  function isIntegerNumber(n) {
    return isFiniteNumber(n) && Math.floor(n) === n;
  }

  function pad2(n) {
    return n < 10 ? '0' + n : String(n);
  }

  function isArray(val) {
    return Object.prototype.toString.call(val) === '[object Array]';
  }

  function isTypingTarget(el) {
    if (!el || !el.tagName) return false;
    var t = el.tagName.toLowerCase();
    return t === 'textarea' || t === 'input' || el.isContentEditable;
  }

  function normalizePlayers(obj) {
    var list = [];
    var i;
    var p;
    if (!obj || !isArray(obj.players)) return null;
    for (i = 0; i < obj.players.length; i++) {
      p = obj.players[i];
      list.push({
        name: String(p.name),
        backgroundColor: String(p.backgroundColor),
        increment: Number(p.increment),
        startTime: Number(p.startTime)
      });
    }
    return list;
  }

  function parseConfig(text) {
    var trimmed = text.replace(/^\s+|\s+$/g, '');
    var data;
    var players;
    var i;
    var p;
    if (!trimmed) return { error: 'Config is empty.' };
    try {
      data = JSON.parse(trimmed);
    } catch (e) {
      return { error: 'Config is not valid JSON.' };
    }
    players = normalizePlayers(data);
    if (!players || players.length === 0) {
      return { error: 'Config must include a non-empty "players" array.' };
    }
    for (i = 0; i < players.length; i++) {
      p = players[i];
      if (!isFiniteNumber(p.increment) || p.increment < 0) {
        return { error: 'Player ' + (i + 1) + ': increment must be a non-negative number.' };
      }
      if (!isFiniteNumber(p.startTime) || p.startTime < 0) {
        return { error: 'Player ' + (i + 1) + ': startTime must be a non-negative number.' };
      }
    }
    return { config: { players: players } };
  }

  function configsMatch(configA, configB) {
    return JSON.stringify(configA.players) === JSON.stringify(configB.players);
  }

  function parseSave(text) {
    var trimmed = text.replace(/^\s+|\s+$/g, '');
    var data;
    var normalizedSaveConfig;
    var rem = [];
    var oc = [];
    var ci;
    var nPlayers;
    var outCounts = null;
    var i;
    if (!trimmed) return { empty: true };
    try {
      data = JSON.parse(trimmed);
      if (data == null || typeof data !== 'object') {
        return { error: 'Save state must be a JSON object.' };
      }
      if (!data.config || !data.config.players) {
        return { error: 'Save state must include a "config" object with "players".' };
      }
      normalizedSaveConfig = { players: normalizePlayers(data.config) };
      if (!normalizedSaveConfig.players) {
        return { error: 'Save state config.players is invalid.' };
      }
      if (!isArray(data.remainingMs)) {
        return { error: 'Save state must include "remainingMs" array.' };
      }
      for (i = 0; i < data.remainingMs.length; i++) {
        rem.push(Number(data.remainingMs[i]));
      }
      for (i = 0; i < rem.length; i++) {
        if (!isFiniteNumber(rem[i]) || rem[i] < 0) {
          return { error: 'remainingMs must be non-negative numbers.' };
        }
      }
      ci = Number(data.currentIndex);
      if (!isIntegerNumber(ci) || ci < 0 || ci >= normalizedSaveConfig.players.length) {
        return { error: 'currentIndex is out of range for this save.' };
      }
      if (rem.length !== normalizedSaveConfig.players.length) {
        return { error: 'remainingMs length does not match players in save.' };
      }
      nPlayers = normalizedSaveConfig.players.length;
      if (data.outOfTimeCounts !== undefined) {
        if (!isArray(data.outOfTimeCounts)) {
          return { error: 'outOfTimeCounts must be an array when present.' };
        }
        for (i = 0; i < data.outOfTimeCounts.length; i++) {
          oc.push(Number(data.outOfTimeCounts[i]));
        }
        if (oc.length !== nPlayers) {
          return { error: 'outOfTimeCounts length must match players.' };
        }
        for (i = 0; i < oc.length; i++) {
          if (!isIntegerNumber(oc[i]) || oc[i] < 0) {
            return { error: 'outOfTimeCounts must be non-negative integers.' };
          }
        }
        outCounts = oc;
      }
      return {
        empty: false,
        config: normalizedSaveConfig,
        remainingMs: rem,
        currentIndex: ci,
        outOfTimeCounts: outCounts
      };
    } catch (e2) {
      return { error: 'Previous save state is not valid JSON.' };
    }
  }

  function formatTime(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    var h = Math.floor(s / 3600);
    var m = Math.floor((s % 3600) / 60);
    var sec = s % 60;
    if (h > 0) return h + ':' + pad2(m) + ':' + pad2(sec);
    return String(m) + ':' + pad2(sec);
  }

  function appendFlagCount(container, idx) {
    var c = outOfTimeCounts[idx] || 0;
    var el;
    if (c < 1) return;
    el = document.createElement('div');
    el.className = 'flag-count';
    el.appendChild(document.createTextNode('Out of time: ' + c));
    container.appendChild(el);
  }

  function renderClock() {
    var players;
    var n;
    var cur;
    var k;
    var idx;
    var p;
    var cell;
    if (!gameConfig) return;
    players = gameConfig.players;
    n = players.length;
    cur = players[currentIndex];

    mainSlot.style.background = cur.backgroundColor;
    mainSlot.innerHTML = '<div class="name"></div><div class="time"></div>';
    mainSlot.querySelector('.name').appendChild(document.createTextNode(cur.name));
    mainSlot.querySelector('.time').appendChild(document.createTextNode(formatTime(remainingMs[currentIndex])));
    appendFlagCount(mainSlot, currentIndex);

    stripEl.innerHTML = '';
    if (n <= 1) {
      stripEl.style.display = 'none';
      return;
    }
    stripEl.style.display = 'flex';

    for (k = 1; k < n; k++) {
      idx = (currentIndex + k) % n;
      p = players[idx];
      cell = document.createElement('div');
      cell.className = 'strip-cell';
      cell.style.background = p.backgroundColor;
      cell.innerHTML = '<div class="name"></div><div class="time"></div>';
      cell.querySelector('.name').appendChild(document.createTextNode(p.name));
      cell.querySelector('.time').appendChild(document.createTextNode(formatTime(remainingMs[idx])));
      appendFlagCount(cell, idx);
      stripEl.appendChild(cell);
    }
  }

  function stopSiren() {
    try {
      if (sirenLfo && sirenLfo.stop) sirenLfo.stop();
      if (sirenOsc && sirenOsc.stop) sirenOsc.stop();
    } catch (ignore) {}
    sirenLfo = null;
    sirenOsc = null;
    sirenGain = null;
  }

  function startSiren() {
    var ctx;
    var lfoGain;
    if (sirenOsc) return;
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      ctx = audioCtx;
      if (ctx.state === 'suspended' && ctx.resume) ctx.resume();
      sirenGain = ctx.createGain();
      sirenGain.gain.value = 0.12;
      sirenOsc = ctx.createOscillator();
      sirenOsc.type = 'sawtooth';
      sirenOsc.frequency.value = 440;
      sirenLfo = ctx.createOscillator();
      sirenLfo.type = 'sine';
      sirenLfo.frequency.value = 4;
      lfoGain = ctx.createGain();
      lfoGain.gain.value = 280;
      sirenLfo.connect(lfoGain);
      lfoGain.connect(sirenOsc.frequency);
      sirenOsc.connect(sirenGain);
      sirenGain.connect(ctx.destination);
      sirenLfo.start();
      sirenOsc.start();
    } catch (ignore2) {}
  }

  function nowMs() {
    return window.performance && performance.now ? performance.now() : new Date().getTime();
  }

  function tick(now) {
    var delta;
    var before;
    if (!playing) return;
    delta = now - lastTs;
    lastTs = now;
    if (!paused && remainingMs[currentIndex] > 0) {
      before = remainingMs[currentIndex];
      remainingMs[currentIndex] = Math.max(0, remainingMs[currentIndex] - delta);
      if (before > 0 && remainingMs[currentIndex] <= 0) {
        remainingMs[currentIndex] = 0;
        outOfTimeCounts[currentIndex] = (outOfTimeCounts[currentIndex] || 0) + 1;
        startSiren();
      }
    }
    renderClock();
  }

  function scheduleTick() {
    tick(nowMs());
    if (playing) {
      rafId = window.requestAnimationFrame
        ? requestAnimationFrame(scheduleTick)
        : setTimeout(scheduleTick, 33);
    }
  }

  function cancelTick() {
    if (!rafId) return;
    if (window.cancelAnimationFrame) cancelAnimationFrame(rafId);
    else clearTimeout(rafId);
    rafId = 0;
  }

  function setPaused(next) {
    paused = next;
    if (paused) {
      clockEl.className = 'active paused';
      pauseBtn.setAttribute('aria-label', 'Resume');
      pauseBtn.setAttribute('title', 'Resume');
      pauseBtn.innerHTML = '&#9654;';
      stopSiren();
    } else {
      clockEl.className = 'active';
      pauseBtn.setAttribute('aria-label', 'Pause');
      pauseBtn.setAttribute('title', 'Pause');
      pauseBtn.innerHTML = '||';
      if (remainingMs[currentIndex] <= 0) startSiren();
    }
  }

  function copyStateToClipboard() {
    var text = JSON.stringify({
      v: 1,
      config: initialConfig,
      currentIndex: currentIndex,
      remainingMs: remainingMs.slice(),
      outOfTimeCounts: outOfTimeCounts.slice(),
      savedAt: new Date().toISOString()
    });
    var ta;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text);
        return;
      }
    } catch (ignore3) {}
    try {
      ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    } catch (ignore4) {}
  }

  function endTurn() {
    var n;
    var p;
    if (!playing || !gameConfig || paused) return;
    n = gameConfig.players.length;
    undoStack.push({
      remainingMs: remainingMs.slice(),
      outOfTimeCounts: outOfTimeCounts.slice(),
      currentIndex: currentIndex
    });
    p = gameConfig.players[currentIndex];
    remainingMs[currentIndex] += p.increment * 1000;
    currentIndex = (currentIndex + 1) % n;
    stopSiren();
    copyStateToClipboard();
    renderClock();
  }

  function undoTurn() {
    var snap;
    var i;
    if (!playing || paused || undoStack.length === 0) return;
    snap = undoStack.pop();
    remainingMs = snap.remainingMs;
    if (snap.outOfTimeCounts) {
      outOfTimeCounts = snap.outOfTimeCounts.slice();
    } else {
      outOfTimeCounts = makeZeroArray(remainingMs.length);
    }
    currentIndex = snap.currentIndex;
    stopSiren();
    if (remainingMs[currentIndex] <= 0) startSiren();
    renderClock();
  }

  function makeZeroArray(n) {
    var arr = [];
    var i;
    for (i = 0; i < n; i++) arr.push(0);
    return arr;
  }

  function startGame(parsedConfig, resume) {
    var n;
    var i;
    stopSiren();
    gameConfig = parsedConfig;
    initialConfig = JSON.parse(JSON.stringify(parsedConfig));
    n = parsedConfig.players.length;
    if (resume) {
      remainingMs = resume.remainingMs.slice();
      currentIndex = resume.currentIndex;
      outOfTimeCounts = (resume.outOfTimeCounts && resume.outOfTimeCounts.length === n)
        ? resume.outOfTimeCounts.slice()
        : makeZeroArray(n);
    } else {
      remainingMs = [];
      for (i = 0; i < n; i++) {
        remainingMs.push(parsedConfig.players[i].startTime * 1000);
      }
      outOfTimeCounts = makeZeroArray(n);
      currentIndex = 0;
    }
    undoStack = [];
    paused = false;
    clockEl.className = 'active';
    pauseBtn.innerHTML = '||';
    pauseBtn.setAttribute('aria-label', 'Pause');
    pauseBtn.setAttribute('title', 'Pause');
    playing = true;
    overlay.className = 'hidden';
    clockEl.setAttribute('aria-hidden', 'false');
    lastTs = nowMs();
    cancelTick();
    scheduleTick();
    if (remainingMs[currentIndex] <= 0) startSiren();
    renderClock();
  }

  function showError(msg) {
    startError.innerHTML = '';
    startError.appendChild(document.createTextNode(msg));
  }

  function tryGo() {
    var cfgResult = parseConfig(configInput.value);
    var saveResult;
    startError.innerHTML = '';
    if (cfgResult.error) {
      showError(cfgResult.error);
      return;
    }
    saveResult = parseSave(saveInput.value);
    if (saveResult.error) {
      showError(saveResult.error);
      return;
    }
    if (saveResult.empty) {
      startGame(cfgResult.config, null);
      return;
    }
    if (!configsMatch(cfgResult.config, saveResult.config)) {
      showError('Save state does not match config. Use the same players as in the saved config.');
      return;
    }
    startGame(cfgResult.config, saveResult);
  }

  function onKeyDown(e) {
    var code = e.code || e.key || '';
    var keyCode = e.keyCode || e.which;
    if (!playing || isTypingTarget(document.activeElement)) return;
    if (code === 'Space' || keyCode === 32) {
      if (e.preventDefault) e.preventDefault();
      if (!paused) endTurn();
    } else if (code === 'Escape' || keyCode === 27) {
      if (e.preventDefault) e.preventDefault();
      if (!paused) undoTurn();
    }
  }

  goBtn.addEventListener('click', tryGo);
  pauseBtn.addEventListener('click', function (e) {
    if (e.stopPropagation) e.stopPropagation();
    if (!playing) return;
    setPaused(!paused);
  });
  clockEl.addEventListener('click', function () {
    if (!playing || paused) return;
    endTurn();
  });
  document.addEventListener('keydown', onKeyDown);
})();
  </script>
</body>
</html>
